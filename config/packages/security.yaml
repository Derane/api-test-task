security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: login

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        api:
            pattern: ^/v1/api
            stateless: true
            provider: app_user_provider
            entry_point: App\Security\ApiAuthenticationEntryPoint
            access_token:
                token_handler: App\Security\ApiTokenHandler
                failure_handler: App\Security\ApiAuthenticationEntryPoint

    access_control:
        - { path: ^/v1/api, roles: IS_AUTHENTICATED_FULLY }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
